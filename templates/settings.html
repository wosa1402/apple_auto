{% extends "base.html" %}
{% block title %}系统设置 - AppleID Auto Lite{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h4 class="mb-3">系统设置</h4>
        <form method="post">
            <div class="card mb-3">
                <div class="card-header">安全</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">管理员密码</label>
                        <input type="password" name="admin_password" class="form-control"
                               placeholder="留空则保持当前密码">
                        <div class="form-text">当前密码已设置。输入新密码进行修改。</div>
                    </div>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-header">通知</div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Telegram Bot Token</label>
                            <input type="text" name="tg_bot_token" class="form-control"
                                   value="{{ settings.tg_bot_token or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telegram Chat ID</label>
                            <input type="text" name="tg_chat_id" class="form-control"
                                   value="{{ settings.tg_chat_id or '' }}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">微信 pushplus Token</label>
                            <input type="text" name="wx_pusher_id" class="form-control"
                                   value="{{ settings.wx_pusher_id or '' }}">
                            <div class="form-text"><a href="https://www.pushplus.plus/" target="_blank">获取Token</a></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Webhook URL</label>
                            <input type="text" name="webhook_url" class="form-control"
                                   value="{{ settings.webhook_url or '' }}">
                        </div>
                    </div>
                    <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-test-notify">
                        测试通知
                    </button>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-header">WebDriver 设置</div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-8">
                            <label class="form-label">WebDriver URL</label>
                            <input type="text" name="webdriver_url" class="form-control"
                                   value="{{ settings.webdriver_url or 'local' }}">
                            <div class="form-text">"local" 表示使用本地 Chrome，或填写远程地址如 "http://host:4444"</div>
                        </div>
                        <div class="col-md-4 d-flex align-items-end">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="headless" value="true"
                                       {{ 'checked' if settings.headless != 'false' else '' }}>
                                <label class="form-check-label">无头模式</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-3">
                <div class="card-header">默认设置</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">默认检测间隔（分钟）</label>
                        <input type="number" name="default_check_interval" class="form-control" min="1"
                               value="{{ settings.default_check_interval or 30 }}">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">保存设置</button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    document.getElementById('btn-test-notify').addEventListener('click', function() {
        fetch('/settings/test_notification', {method: 'POST'})
            .then(r => r.json())
            .then(data => alert(data.message || '已发送'))
            .catch(() => alert('发送失败'));
    });
</script>
{% endblock %}
