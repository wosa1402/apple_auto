{% extends "base.html" %}
{% block title %}{{ 'Edit' if proxy else 'Add' }} Proxy - AppleID Auto Lite{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h4 class="mb-3">{{ 'Edit' if proxy else 'Add' }} Proxy</h4>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Protocol</label>
                <select name="protocol" class="form-select">
                    {% for p in ['http', 'socks5', 'http+url', 'socks5+url'] %}
                    <option value="{{ p }}" {{ 'selected' if proxy and proxy.protocol == p else '' }}>{{ p }}</option>
                    {% endfor %}
                </select>
                <div class="form-text">Use "http+url" or "socks5+url" for dynamic proxy URL that returns IP:port.</div>
            </div>
            <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" name="content" class="form-control" required placeholder="IP:port or URL"
                       value="{{ proxy.content if proxy else '' }}">
            </div>
            <div class="mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="enabled" value="1"
                           {{ 'checked' if (proxy and proxy.enabled) or not proxy else '' }}>
                    <label class="form-check-label">Enabled</label>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{{ url_for('proxy_list') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
